name: JustRunMy 多账号续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 这里定义后缀，有几个号就写几个，例如 ['1', '2', '3']
        suffix: ['1', '2']

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver
          
      - name: 🚀 运行重命名后的脚本
        env:
          # 【映射核心】将你的特殊命名变量映射给脚本需要的变量名
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.suffix)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.suffix)] }}
          TG_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_ID }}
        run: |
          sleep $((RANDOM % 30))
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py
